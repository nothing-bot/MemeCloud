<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTUp7P_PvmBBZ2fs-LMju29bK_XsLcfNU",
  authDomain: "memecloud-3c2f4.firebaseapp.com",
  projectId: "memecloud-3c2f4",
  storageBucket: "memecloud-3c2f4.firebasestorage.app",
  messagingSenderId: "167812158830",
  appId: "1:167812158830:web:5472c576e28eec0d451d7f",
  measurementId: "G-VPNEQG9PM3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const ADMIN = "thirdpartylogin4@gmail.com";

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const uploadPanel = document.getElementById("uploadPanel");
const container = document.getElementById("memeContainer");

getRedirectResult(auth)
  .then((result) => {
    if (result?.user) console.log("Logged in:", result.user.email);
  })
  .catch((error) => console.error(error));

loginBtn.onclick = async () => {
  try {
    await signInWithRedirect(auth, provider);
  } catch (error) {
    console.error("Auth Error:", error);
  }
};

logoutBtn.onclick = () => signOut(auth);

// Fixed Login Logic Flow
onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";

    // Only show upload to admin
    if (user.email === ADMIN) {
      uploadPanel.style.display = "block";
    } else {
      uploadPanel.style.display = "none";
    }
  } else {
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
    uploadPanel.style.display = "none";
  }
});

document.getElementById("uploadBtn").onclick = async () => {
  const title = document.getElementById("title").value;
  const imageUrl = document.getElementById("imageUrl").value;

  if (!title || !imageUrl) {
    alert("Fill all fields");
    return;
  }

  await addDoc(collection(db, "memes"), {
    title,
    imageUrl,
    uploadedBy: auth.currentUser?.email || "Anonymous",
    createdAt: new Date().toISOString(),
    likes: 0
  });

  location.reload();
};

// Fixed Render Loop via Event Listeners instead of Inline HTML
async function loadMemes() {
  container.innerHTML = "";
  const q = query(collection(db, "memes"), orderBy("createdAt", "desc"));
  const snapshot = await getDocs(q);

  snapshot.forEach((doc) => {
    const meme = doc.data();
    
    const card = document.createElement("div");
    card.className = "card";
    
    // Using innerHTML safely since text elements are handled or static
    card.innerHTML = `
      <img src="${meme.imageUrl}" alt="Meme">
      <div class="content">
        <div class="title"></div>
        <div class="date">${meme.createdAt.split('T')[0]}</div>
        <div class="actions">
          <button class="like-btn">👍 ${meme.likes || 0}</button>
          <button class="share-btn">📤</button>
          <button class="open-btn">⬇️</button>
        </div>
      </div>
    `;

    // Securely escape user-generated text using textContent
    card.querySelector(".title").textContent = meme.title;

    // Fixed Module Scope Click Handlers
    card.querySelector(".share-btn").onclick = () => {
      if (navigator.share) {
        navigator.share({ title: meme.title, url: meme.imageUrl });
      } else {
        alert("Sharing not supported on this browser");
      }
    };

    card.querySelector(".open-btn").onclick = () => {
      window.open(meme.imageUrl, '_blank');
    };

    container.appendChild(card);
  });
}

loadMemes().catch(console.error);
</script>
