<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MemeCloud</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f5f5f5;
      margin:0;
      padding:20px;
    }

    h1{
      text-align:center;
    }

    #memes{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
      gap:15px;
      margin-top:20px;
    }

    .meme{
      background:white;
      border-radius:10px;
      overflow:hidden;
      box-shadow:0 2px 5px rgba(0,0,0,.1);
    }

    .meme img{
      width:100%;
      display:block;
    }

    .meme h3{
      padding:10px;
      margin:0;
    }
  </style>
</head>
<body>

<h1>☁️ MemeCloud</h1>

<div id="memes">Loading memes...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTUp7P_PvmBBZ2fs-LMju29bK_XsLcfNU",
  authDomain: "memecloud-3c2f4.firebaseapp.com",
  projectId: "memecloud-3c2f4",
  storageBucket: "memecloud-3c2f4.firebasestorage.app",
  messagingSenderId: "167812158830",
  appId: "1:167812158830:web:5472c576e28eec0d451d7f",
  measurementId: "G-VPNEQG9PM3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadMemes() {
  const container = document.getElementById("memes");
  container.innerHTML = "";

  const snapshot = await getDocs(collection(db, "memes"));

  snapshot.forEach((doc) => {
  const meme = doc.data();

  container.innerHTML += `
    <div class="meme">
      <img src="${meme.imageUrl}" alt="${meme.title}">
      <h3>${meme.title}</h3>
    </div>
  `;
});

}

loadMemes().catch(error => {
  document.getElementById("memes").innerHTML =
    "Error: " + error.message;
});
</script>

</body>
</html>
