<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MemeCloud</title>

<style>
body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#121212;
  color:white;
}

header{
  padding:20px;
  text-align:center;
  font-size:32px;
  font-weight:bold;
}

#loginBtn,#logoutBtn,#uploadBtn{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

#loginBtn{
  background:#4285F4;
  color:white;
}

#logoutBtn{
  background:#ff4444;
  color:white;
}

#uploadPanel{
  display:none;
  background:#1e1e1e;
  margin:15px;
  padding:15px;
  border-radius:15px;
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  box-sizing:border-box;
}

#uploadBtn{
  margin-top:10px;
  background:#00c853;
  color:white;
  width:100%;
}

#memeContainer{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:#1e1e1e;
  border-radius:15px;
  overflow:hidden;
  position: relative;
}

.card img{
  width:100%;
  display:block;
}

.content{
  padding:12px;
}

.title{
  font-size:20px;
  font-weight:bold;
}

.date{
  color:#bbb;
  margin-top:5px;
}

.actions{
  display:flex;
  justify-content:space-around;
  margin-top:10px;
}

.actions button{
  background:none;
  border:none;
  color:white;
  font-size:18px;
  cursor:pointer;
}

/* Delete Button UI Styles */
.delete-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(255, 68, 68, 0.9) !important;
  color: white !important;
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  font-size: 16px;
  cursor: pointer;
  display: none; /* Controlled via JS based on login */
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>

<header>☁️ MemeCloud</header>

<div style="text-align:center">
  <button id="loginBtn">Login with Google</button>
  <button id="logoutBtn" style="display:none">Logout</button>
</div>

<div id="uploadPanel">
  <h3>Upload Meme</h3>
  <input id="title" placeholder="Meme title">
  <input id="imageUrl" placeholder="Image URL">
  <button id="uploadBtn">Upload Meme</button>
</div>

<div id="memeContainer">
  Loading memes...
</div>

<script type="module">
import { initializeApp } 
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, increment } 
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBTUp7P_PvmBBZ2fs-LMju29bK_XsLcfNU",
  authDomain: "memecloud-3c2f4.firebaseapp.com",
  projectId: "memecloud-3c2f4",
  storageBucket: "memecloud-3c2f4.firebasestorage.app",
  messagingSenderId: "167812158830",
  appId: "1:167812158830:web:5472c576e28eec0d451d7f",
  measurementId: "G-VPNEQG9PM3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

const ADMIN = "thirdpartylogin4@gmail.com";

const loginBtn = document.getElementById("loginBtn");
const logoutBtn = document.getElementById("logoutBtn");
const uploadPanel = document.getElementById("uploadPanel");
const container = document.getElementById("memeContainer");

loginBtn.onclick = async () => {
  try {
    await signInWithPopup(auth, provider);
  } catch (error) {
    console.error(error);
    alert("Authentication failed: " + error.message);
  }
};

logoutBtn.onclick = () => signOut(auth).catch(console.error);

onAuthStateChanged(auth, (user) => {
  if (user) {
    loginBtn.style.display = "none";
    logoutBtn.style.display = "inline-block";
    uploadPanel.style.display = (user.email === ADMIN) ? "block" : "none";
  } else {
    loginBtn.style.display = "inline-block";
    logoutBtn.style.display = "none";
    uploadPanel.style.display = "none";
  }
  // Re-render display states for admin controls if user profile status alterations happen
  toggleAdminElements(user);
});

// Controls visibility of delete elements across already rendered items
function toggleAdminElements(user) {
  const deleteButtons = document.querySelectorAll(".delete-btn");
  deleteButtons.forEach(btn => {
    btn.style.display = (user && user.email === ADMIN) ? "flex" : "none";
  });
}

document.getElementById("uploadBtn").onclick = async () => {
  const title = document.getElementById("title").value.trim();
  const imageUrl = document.getElementById("imageUrl").value.trim();

  if (!title || !imageUrl) {
    alert("Please fill out all fields.");
    return;
  }

  try {
    await addDoc(collection(db, "memes"), {
      title,
      imageUrl,
      uploadedBy: auth.currentUser?.email || "Anonymous",
      createdAt: new Date().toISOString(),
      likes: 0
    });
    
    document.getElementById("title").value = "";
    document.getElementById("imageUrl").value = "";
    loadMemes();
  } catch (error) {
    alert("Error uploading: " + error.message);
  }
};

async function loadMemes() {
  container.innerHTML = "Loading memes...";
  
  try {
    const q = query(collection(db, "memes"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);
    container.innerHTML = "";

    if (snapshot.empty) {
      container.innerHTML = "<p style='padding:15px;'>No memes uploaded yet!</p>";
      return;
    }

    snapshot.forEach((docSnap) => {
      const meme = docSnap.data();
      const id = docSnap.id;
      
      const card = document.createElement("div");
      card.className = "card";
      
      card.innerHTML = `
        <button class="delete-btn" title="Delete Meme">🗑️</button>
        <img src="${meme.imageUrl}" alt="Meme" onerror="this.src='https://placehold.co/600x400?text=Invalid+Image+URL'">
        <div class="content">
          <div class="title"></div>
          <div class="date">${meme.createdAt ? meme.createdAt.split('T')[0] : ''}</div>
          <div class="actions">
            <button class="like-btn">👍 <span>${meme.likes || 0}</span></button>
            <button class="share-btn">📤</button>
            <button class="open-btn">⬇️</button>
          </div>
        </div>
      `;

      card.querySelector(".title").textContent = meme.title;

      // Check access rule right away on generation loop
      const currentLoggedInUser = auth.currentUser;
      if (currentLoggedInUser && currentLoggedInUser.email === ADMIN) {
        card.querySelector(".delete-btn").style.display = "flex";
      }

      // 1. LIKE BUTTON INTERACTION
      const likeBtn = card.querySelector(".like-btn");
      likeBtn.onclick = async () => {
        try {
          const memeRef = doc(db, "memes", id);
          await updateDoc(memeRef, { likes: increment(1) });
          
          // Smooth live update directly in current viewport markup
          const label = likeBtn.querySelector("span");
          label.textContent = parseInt(label.textContent) + 1;
        } catch (err) {
          console.error("Couldn't like post:", err);
        }
      };

      // 2. SHARE BUTTON INTERACTION
      card.querySelector(".share-btn").onclick = () => {
        if (navigator.share) {
          navigator.share({ title: meme.title, url: meme.imageUrl }).catch(console.error);
        } else {
          alert("Sharing not supported natively on this browser.");
        }
      };

      // 3. FIXED DOWNLOAD BUTTON ACTION
      card.querySelector(".open-btn").onclick = async () => {
        try {
          // Fetches data structure to form blob converting network links to downloadable formats
          const response = await fetch(meme.imageUrl);
          const blob = await response.blob();
          const blobUrl = window.URL.createObjectURL(blob);
          
          const a = document.createElement("a");
          a.href = blobUrl;
          a.download = meme.title.replace(/[^a-z0-9]/gi, '_').toLowerCase() + ".jpg";
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          window.URL.revokeObjectURL(blobUrl);
        } catch (err) {
          console.warn("Direct download blocked by CORS. Opening in new tab instead.");
          window.open(meme.imageUrl, '_blank');
        }
      };

      // 4. ADMIN DELETE METHOD
      card.querySelector(".delete-btn").onclick = async () => {
        if (confirm(`Are you sure you want to delete "${meme.title}"?`)) {
          try {
            await deleteDoc(doc(db, "memes", id));
            card.remove(); // Fast clean view extraction
          } catch (err) {
            alert("Delete failed: " + err.message);
          }
        }
      };

      container.appendChild(card);
    });

  } catch (err) {
    container.innerHTML = "Error loading memes: " + err.message;
  }
}

loadMemes().catch(console.error);
</script>

</body>
</html>
